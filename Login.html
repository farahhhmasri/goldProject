<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image: url(Images/Gold_back.png);
    background-position: center;
    background-size: cover;    
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background: #1e293b;
    opacity: 0.8;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h2{
    color:#facc15;
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#facc15;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#eab308;
}

p{
    color:#94a3b8;
    text-align:center;
}

a{
    color:#facc15;
    text-decoration:none;
}
</style>
</head>

<body>


<div class="container">
    <h2>Login</h2>

    <input type="email" placeholder="Email" id="email">
    <small id="email-error" style="color: red;"></small>
    <input type="password" placeholder="Password" id="password">
    <small id="password-error" style="color: red;"></small>
    <button id="button" >Login</button>

    <p>Don't have an account? <a href="Register.html">  Register</a></p>
</div>



<script>
let emailpatren= /^[a-zA-Z0-9.%+-]+@[gmail]+.com$/;
let email=document.getElementById('email');
let password=document.getElementById('password');
let button=document.getElementById('button');
let emailError=document.getElementById('email-error');
let passwordError=document.getElementById('password-error');
button.addEventListener('click',()=>{
    const users = JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(u => 
        u.email === email.value && u.password === password.value
    );
   if(email.value === '' || password.value === ''){
        emailError.textContent = 'Email is required';
        passwordError.textContent = 'Password is required';
    }

  else if(!emailpatren.test(email.value)){
        emailError.textContent = 'Invalid email format';
    }

    else if(user){
        // نجاح
        sessionStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = 'Home.html';}

    else{
        alert('Invalid email or password');
    }


});


</script>



</body>
</html>
