<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gold Prices</title>
    <link rel="stylesheet" href="homeStyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="title">
        <i
          class="fa-solid fa-coins"
          style="color: gold; padding-right: 5px"
        ></i>
        <h2>Logo</h2>
      </div>
      <div>
        <a name="myAssets" value="myAssets" href="#">My Assets</a>
        <a name="login" value="login" href="#">Login</a>
        <a name="signup" value="signup" href="#">Sign Up</a>
      </div>
    </header>

    <main>
      <section class="prices">
        <div class="price-card-main">
          <h5>Live Gold Price</h5>
          <h4 id="currentPriceCard"></h4>
          <p id="changeOfPrice" class="changeOfPrice">+0.00%</p>
          <div>
            <button name="usCurrency" value="USD">USD</button>
            <button name="joCurrency" value="JOD">JOD</button>
          </div>
        </div>

        <div class="price-card">
          <p>🟨</p>
          <h5>Gold Bar</h5>
          <hr />
          <h4>0.00</h4>
        </div>
        <div class="price-card">
          <p>🪙</p>
          <h5>Rashadi Coin</h5>
          <hr />
          <h4>0.00</h4>
        </div>
        <div class="price-card">
          <p>🪙</p>
          <h5>English Coin</h5>
          <hr />
          <h4>0.00</h4>
        </div>
        <div class="price-card">
          <p><i class="fa-solid fa-diamond" style="color: #ffd166"></i></p>
          <h5>24k Gold</h5>
          <hr />
          <h4>0.00</h4>
        </div>
        <div class="price-card">
          <p><i class="fa-solid fa-diamond" style="color: #ff6b35"></i></p>
          <h5>21k Gold</h5>
          <hr />
          <h4>0.00</h4>
        </div>
        <div class="price-card">
          <p><i class="fa-solid fa-diamond" style="color: #c2336e"></i></p>
          <h5>18k Gold</h5>
          <hr />
          <h4>0.00</h4>
        </div>
      </section>
      <section id="chart" class="chart"></section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="homeArchitecture.js"></script>
  </body>
</html>
